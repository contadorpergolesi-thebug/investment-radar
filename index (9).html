<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:#30363d;
  --green:#3fb950;--gdim:#1a3a24;
  --amber:#d29922;--adim:#3a2d0a;
  --orange:#e07e3a;--odim:#3a200a;
  --red:#f85149;--rdim:#3a1010;
  --blue:#58a6ff;--bdim:#1f3a5f;
  --text:#e6edf3;--muted:#8b949e;--acc:#58a6ff;
}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
body{padding:20px 24px 60px}
/* Header */
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.hdr h1{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;letter-spacing:.05em}
.hdr .sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Search overlay */
#search-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;padding:60px 20px 20px;backdrop-filter:blur(4px)}
#search-overlay.open{display:block}
#search-box{width:100%;max-width:600px;margin:0 auto;display:block;font-size:16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--acc);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;outline:none}
#search-results{width:100%;max-width:600px;margin:8px auto 0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:60vh;overflow-y:auto}
.sr-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(48,54,61,.5)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg3)}
.sr-ticker{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--acc);min-width:56px}
.sr-name{color:var(--text);font-size:13px}
.sr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin:12px 0 18px;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.kpi.g::before{background:var(--green)}.kpi.a::before{background:var(--amber)}.kpi.b::before{background:var(--acc)}.kpi.r::before{background:var(--red)}
.kpi .lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi .val{font-size:26px;font-family:'IBM Plex Mono',monospace;font-weight:600;line-height:1}
.kpi.g .val{color:var(--green)}.kpi.a .val{color:var(--amber)}.kpi.r .val{color:var(--red)}
.kpi .det{font-size:11px;color:var(--muted);margin-top:4px}
/* Market bar */
.mkt-bar{display:flex;gap:16px;margin-bottom:14px;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;overflow-x:auto;flex-wrap:nowrap}
.mkt-item{display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:11px;font-family:'IBM Plex Mono',monospace}
.mkt-name{color:var(--muted)}
.mkt-price{color:var(--text);font-weight:500}
.mkt-chg{font-weight:600}
/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--acc);letter-spacing:.09em;font-weight:600;background:var(--bg3)}
/* Tables */
table{width:100%;border-collapse:collapse}
th{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-align:left;padding:8px 10px 6px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th .sort-arrow{margin-left:3px;opacity:.4}
th.sorted .sort-arrow{opacity:1;color:var(--acc)}
td{font-size:12px;padding:7px 10px;border-bottom:1px solid rgba(48,54,61,.4);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tkr{color:var(--acc);font-family:'IBM Plex Mono',monospace;font-weight:500;cursor:pointer;font-size:12px}
.tkr:hover{text-decoration:underline}
.co{color:var(--muted);font-size:11px}
/* Badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:500;white-space:nowrap}
.bdg-g{background:var(--gdim);color:var(--green)}
.bdg-a{background:var(--adim);color:var(--amber)}
.bdg-o{background:var(--odim);color:var(--orange)}
.bdg-r{background:var(--rdim);color:var(--red)}
.bdg-e{background:var(--bdim);color:var(--blue)}
/* Score bar */
.sbar{width:52px;height:5px;background:var(--bg3);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px}
.sbar-f{height:5px;border-radius:3px}
/* Up/down */
.up{color:var(--green);font-weight:500;font-family:'IBM Plex Mono',monospace}
.dn{color:var(--red);font-weight:500;font-family:'IBM Plex Mono',monospace}
.nt{color:var(--muted)}
/* Earnings tag */
.etag{background:var(--odim);color:var(--orange);font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;margin-left:3px;font-family:'IBM Plex Mono',monospace}
/* Sparkline */
.spark{display:inline-block;vertical-align:middle}
/* Fav star */
.fav-star{cursor:pointer;font-size:14px;line-height:1;background:none;border:none;padding:0 3px;opacity:.4;transition:opacity .15s}
.fav-star.on{opacity:1;color:#f1c40f}
.fav-star:hover{opacity:.8}
/* Bottom row */
.bot-row{display:grid;grid-template-columns:260px 1fr;gap:12px}
.donut-card,.bar-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:15px}
.sec-ttl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--acc);letter-spacing:.09em;font-weight:600;margin-bottom:12px;text-transform:uppercase}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.leg-lbl{color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;flex:1}
.leg-n{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;min-width:20px;text-align:right}
.leg-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;text-align:right}
.br-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.br-lbl{width:44px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--acc);flex-shrink:0}
.br-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.br-fill{height:100%;border-radius:3px;background:var(--acc)}
.br-fill-g{background:var(--green)}
.br-val{width:46px;text-align:right;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
/* Strip */
.strip{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.s-pill{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.s-pill span{font-weight:600;margin-left:3px}
/* Search row */
.srch-row{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.srch-row input,.srch-row select{font-size:12px;height:32px;border-radius:6px;padding:0 10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;font-family:'IBM Plex Sans',sans-serif}
.srch-row input{flex:1;min-width:140px}.srch-row input:focus,.srch-row select:focus{border-color:var(--acc)}
.srch-row select option{background:var(--bg2)}
/* Tbl wrap */
.tbl-wrap{overflow-x:auto}
/* Cht wrap */
.cht-wrap{position:relative;width:100%;margin-bottom:14px}
/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:15px 17px;margin-bottom:14px}
/* Notice */
.notice{font-size:11px;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
/* Detail */
.detail-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:16px;margin-bottom:14px}
.back-btn{font-size:12px;margin-bottom:14px;cursor:pointer;background:none;border:none;color:var(--muted);padding:0;display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace}
.back-btn:hover{color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.snowcard{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px}
/* Compare */
.compare-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;flex-wrap:wrap}
.compare-chip{display:flex;align-items:center;gap:6px;background:var(--bdim);border:1px solid var(--blue);border-radius:5px;padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--blue)}
.compare-chip button{background:none;border:none;color:var(--blue);cursor:pointer;padding:0;line-height:1;font-size:13px}
/* Notes */
.note-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:8px 10px;resize:vertical;min-height:60px;outline:none;margin-top:10px}
.note-area:focus{border-color:var(--acc)}
/* PDF button */
.pdf-btn{font-size:11px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;cursor:pointer;transition:all .15s}
.pdf-btn:hover{border-color:var(--acc);color:var(--acc)}
/* Heatmap */
.hm-cell{border-radius:5px;padding:5px 7px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .15s}
.hm-cell:hover{opacity:.8}
/* Portfolio input */
.pfin{width:88px;text-align:right;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'IBM Plex Mono',monospace}
/* Price bar */
#price-bar{position:fixed;bottom:0;left:0;right:0;padding:5px 16px;font-size:11px;font-family:'IBM Plex Mono',monospace;z-index:999;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);background:var(--bg2);transition:all .3s}
/* Refresh btn */
#refresh-btn{font-size:10px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;margin-left:auto}
#refresh-btn:hover{border-color:var(--acc);color:var(--acc)}
/* Search btn */
#search-btn{font-size:14px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:3px 9px;cursor:pointer;transition:all .15s;white-space:nowrap}
#search-btn:hover{border-color:var(--acc);color:var(--acc)}
/* Footer */
footer{margin-top:22px;padding-top:12px;border-top:1px solid var(--border);font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
@media(max-width:600px){.two-col,.g2,.bot-row,.kpi-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media print{#price-bar,#search-overlay,#refresh-btn,#search-btn,.tabs,.back-btn{display:none!important}body{padding:10px}footer{margin-top:10px}}

/* ── ALERTS ─────────────────────────────────────────────────── */
.alert-toast{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.alert-toast-item{background:var(--bg2);border:1px solid var(--green);border-radius:8px;padding:12px 16px;min-width:260px;max-width:320px;pointer-events:all;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.alert-toast-item.above{border-color:var(--green)}
.alert-toast-item.below{border-color:var(--red)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.alert-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.alert-modal.open{display:flex}
.alert-modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:440px;max-height:80vh;overflow-y:auto}
.alert-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.5)}
.alert-item:last-child{border-bottom:none}
.alert-input{width:90px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px 8px;outline:none;text-align:right}
.alert-input:focus{border-color:var(--acc)}
.alert-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;opacity:.6}
.alert-del:hover{opacity:1}

.tc{display:none}.tc.active{display:block}

/* ── MIS TICKERS ───────────────────────────────────────────── */
.mt-form{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:18px;margin-bottom:16px}
.mt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.mt-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 10px;outline:none;width:100%}
.mt-input:focus{border-color:var(--acc)}
.mt-input::placeholder{color:var(--muted)}
.mt-btn{padding:8px 16px;border-radius:6px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.mt-btn-add{background:var(--acc);color:#000;font-weight:600}
.mt-btn-add:hover{background:#79b8ff}
.mt-btn-add:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed}
.mt-loading{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.mt-spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mt-result{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.mt-result-ticker{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--acc);font-size:14px;min-width:60px}
.mt-result-name{color:var(--text);font-size:12px;flex:1}
.mt-result-price{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text)}
.mt-result-chg{font-family:'IBM Plex Mono',monospace;font-size:12px}
.mt-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'IBM Plex Mono',monospace}
.mt-custom-badge{background:var(--bdim);color:var(--blue);font-size:9px;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;margin-left:4px}


/* ── v4 NEW FEATURES ──────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;width:92%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal-box.wide{max-width:780px}
.calc-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.calc-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px 10px;outline:none}
.calc-inp:focus{border-color:var(--acc)}
.view-toggle{display:flex;gap:2px;background:var(--bg3);border-radius:6px;padding:2px}
.view-toggle button{padding:4px 10px;border:none;border-radius:4px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;background:none;color:var(--muted);transition:all .15s}
.view-toggle button.active{background:var(--bg2);color:var(--text)}
.cedear-toggle{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);cursor:pointer}
.cedear-toggle input{cursor:pointer}
.trend-arrow{font-size:11px;margin-left:2px}
#theme-btn{font-size:10px;font-family:'IBM Plex Mono',monospace;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;cursor:pointer;white-space:nowrap;transition:all .15s}
#theme-btn:hover{border-color:var(--acc);color:var(--acc)}


/* ── v5 SCREENER & BUBBLES ──────────────────────────────────── */
.scr-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.scr-sel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;outline:none}
.scr-sel:focus{border-color:var(--acc)}
.scr-sel option{background:var(--bg2)}
.scr-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;outline:none}
.scr-inp:focus{border-color:var(--acc)}

</style>
</head>

function badge(s) {
  if (!s || s.includes('ETF')) return '<span class="bdg bdg-e">ETF</span>';
  if (s.includes('Verde'))    return '<span class="bdg bdg-g">✓ Compra</span>';
  if (s.includes('Amarillo')) return '<span class="bdg bdg-a">◎ Esperar</span>';
  if (s.includes('Naranja'))  return '<span class="bdg bdg-o">⊙ Pos. chica</span>';
  if (s.includes('Rojo'))     return '<span class="bdg bdg-r">✗ Evitar</span>';
  return '<span class="bdg bdg-e">—</span>';
}
function sbar(v) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="nt" style="font-size:11px">—</span>';
  const p = Math.round((parseFloat(v)/10)*100);
  const c = v >= 7.5 ? '#3fb950' : v < 5 ? '#f85149' : v < 6.5 ? '#e07e3a' : '#58a6ff';
  return `<span class="sbar"><span class="sbar-f" style="width:${p}%;background:${c}"></span></span><span style="font-size:12px;font-family:monospace">${v.toFixed(1)}</span>`;
}
function upStr(u) {
  if (u === null || u === undefined || isNaN(u)) return '<span class="nt">—</span>';
  const p = (parseFloat(u)*100).toFixed(1);
  if (u >= 0.1)  return `<span class="up">+${p}%</span>`;
  if (u < 0)     return `<span class="dn">${p}%</span>`;
  return `<span class="nt">+${p}%</span>`;
}
function chgStr(c) {
  if (c === null || c === undefined || isNaN(c)) return '<span class="nt">—</span>';
  const p = parseFloat(c).toFixed(2);
  if (c > 0)  return `<span class="up">+${p}%</span>`;
  if (c < 0)  return `<span class="dn">${p}%</span>`;
  return `<span class="nt">${p}%</span>`;
}
function etag(d) {
  if (d === null || d === undefined) return '';
  if (d <= 3)  return `<span class="etag" style="background:#3a1010;color:#f85149">⚡${d}d</span>`;
  if (d <= 7)  return `<span class="etag">⚡${d}d</span>`;
  if (d <= 14) return `<span class="etag">${d}d</span>`;
  return '';
}

// ── SPARKLINE ───────────────────────────────────────────────────
async function fetchSparkline(ticker) {
  if (sparkCache[ticker] && sparkCache[ticker].length > 1) return sparkCache[ticker];
  // First try local price history (built over time)
  const localHist = priceHistory[ticker];
  if (localHist && localHist.length >= 3) {
    const prices = localHist.map(h => h.price);
    sparkCache[ticker] = prices;
    return prices;
  }
  // Fallback: try Yahoo Finance via a CORS proxy approach
  // Use Finnhub quote to get current + previous close for a 2-point line
  try {
    const r = await fetch('https://finnhub.io/api/v1/quote?symbol=' + ticker + '&token=' + FINNHUB);
    const d = await r.json();
    if (d && d.c && d.pc) {
      // Build a synthetic mini-history from available data
      const prices = [d.l || d.pc * 0.98, d.pc, d.o || d.pc, d.h || d.pc * 1.02, d.c];
      sparkCache[ticker] = prices;
      return prices;
    }
  } catch(e) {}
  return null;
}

function drawSparkline(prices, width, height, color) {
  if (!prices || prices.length < 2) return '';
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const pts = prices.map((p, i) => {
    const x = Math.round((i / (prices.length-1)) * width);
    const y = Math.round(height - ((p - min) / range) * height);
    return `${x},${y}`;
  }).join(' ');
  return `<svg class="spark" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

    bar = document.createElement('div');
    bar.id = 'compare-bar-global';
    bar.className = 'compare-bar';
    document.querySelector('.tabs').after(bar);
  }
  bar.innerHTML = `<span style="font-size:10px;font-family:monospace;color:var(--muted)">COMPARANDO:</span>` +
    compareList.map(t => `<span class="compare-chip">${t}<button onclick="toggleCompare('${t}')">×</button></span>`).join('') +
    `<button onclick="showCompare()" style="font-size:10px;font-family:monospace;background:var(--acc);border:none;color:#000;border-radius:4px;padding:3px 10px;cursor:pointer;margin-left:4px">Ver comparación</button>
    <button onclick="compareList=[];renderCompareBar()" style="font-size:10px;font-family:monospace;background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:3px 8px;cursor:pointer">Limpiar</button>`;
}

function showCompare() {
  if (!compareList.length) return;
  prevTab = activeTab;
  selTicker = '__compare__';
  showTab('detail-view');
  renderCompare();
}

function renderCompare() {
  const root = document.getElementById('detail-view');
  root.innerHTML = '';
  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = '← Volver';
  back.onclick = () => { selTicker = null; showTab(prevTab); const r = {overview:renderOverview,favoritos:renderFavs,watchlist:renderWatchlist,ranking:renderRanking,sectormap:renderSectors,heatmap:renderHeatmap,scatter:renderScatter,earnings:renderEarnings,portfolio:renderPortfolio}; if(r[prevTab]) r[prevTab](); };
  root.appendChild(back);

  const tickers = compareList.map(t => RAW.find(x => x.t === t)).filter(Boolean);
  const title = document.createElement('div');
  title.className = 'sec-ttl';
  title.textContent = 'COMPARACIÓN: ' + compareList.join(' vs ');
  root.appendChild(title);

  // Metrics table
  const metrics = [
    {k:'Precio', fn: x => '$' + x.p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})},
    {k:'Target', fn: x => x.target ? '$' + x.target.toLocaleString('en',{minimumFractionDigits:0}) : '—'},
    {k:'Upside', fn: x => { const u=x.upside; if(u===null) return '—'; const p=(u*100).toFixed(1); return u>0?`+${p}%`:p+'%'; }},
    {k:'Score final', fn: x => x.scoreFin ? x.scoreFin.toFixed(1) : '—'},
    {k:'Señal', fn: x => x.señal ? (x.señal.includes('Verde')?'✓ Compra':x.señal.includes('Amarillo')?'◎ Esperar':x.señal.includes('Naranja')?'⊙ Pos. chica':'✗ Evitar') : '—'},
    {k:'Earnings', fn: x => x.earning !== null ? x.earning + 'd' : '—'},
    {k:'CEDEAR', fn: x => x.cedear === 'CEDEAR' ? '✓' : '—'},
    {k:'Calidad (q)', fn: x => x.q !== null ? x.q : '—'},
    {k:'Balance (b)', fn: x => x.b !== null ? x.b : '—'},
    {k:'Crecimiento (g)', fn: x => x.g !== null ? x.g : '—'},
    {k:'Valuación (v)', fn: x => x.v !== null ? x.v : '—'},
    {k:'Momentum (mo)', fn: x => x.mo !== null ? x.mo : '—'},
  ];

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<table><thead><tr><th>Métrica</th>${tickers.map(x=>`<th>${x.t}</th>`).join('')}</tr></thead><tbody>` +
    metrics.map(m => `<tr><td class="co">${m.k}</td>${tickers.map(x=>`<td style="font-family:monospace;font-size:12px">${m.fn(x)}</td>`).join('')}</tr>`).join('') +
    '</tbody></table>';
  root.appendChild(card);

  // Snowflake comparison chart
  const withSnow = tickers.filter(x => x.q !== null);
  if (withSnow.length >= 2) {
    const snCard = document.createElement('div');
    snCard.className = 'card';
    snCard.innerHTML = `<div class="sec-ttl">SNOWFLAKE — COMPARACIÓN</div><div style="position:relative;width:100%;height:280px"><canvas id="cmp-snow"></canvas></div>`;
    root.appendChild(snCard);
    const colors = ['#58a6ff','#3fb950','#e07e3a','#f85149'];
    dc('cmp-snow');
    _charts['cmp-snow'] = new Chart(document.getElementById('cmp-snow'), {
      type: 'radar',
      data: {
        labels: ['Calidad','Balance','Crecimiento','Valuación','Momentum'],
        datasets: withSnow.map((x, i) => ({
          label: x.t,
          data: [x.q||0, x.b||0, x.g||0, x.v||0, x.mo||0],
          backgroundColor: colors[i] + '22',
          borderColor: colors[i],
          borderWidth: 2,
          pointBackgroundColor: colors[i],
          pointRadius: 4
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { r: { min:0, max:10, ticks:{stepSize:2,font:{size:9},color:'#8b949e',backdropColor:'transparent'}, grid:{color:'rgba(48,54,61,.7)'}, angleLines:{color:'rgba(48,54,61,.7)'}, pointLabels:{font:{size:11},color:'#e6edf3'} } },
        plugins: { legend: { labels: { color: '#e6edf3', font: { family: "'IBM Plex Mono',monospace", size: 11 } } } }
      }
    });
  }
}

function renderWatchlistTable() {
  let data = [...RAW];
  if (srchQ) data = data.filter(x => x.t.toLowerCase().includes(srchQ.toLowerCase()) || x.n.toLowerCase().includes(srchQ.toLowerCase()));
  if (filterBloque !== 'all') data = data.filter(x => x.bloque === filterBloque);
  if (filterSenal !== 'all') data = data.filter(x => x.señal && x.señal.toLowerCase().includes(filterSenal));
  if (filterCedear) data = data.filter(x => x.cedear === 'CEDEAR' || x.cedear === 'CEDEAR ETF');
  if (viewMode === 'cards') {
    const wrap = document.getElementById('wt');
    if (wrap) wrap.innerHTML = renderCards(data) + `<div style="font-size:11px;color:var(--muted);margin-top:10px;font-family:monospace">${data.length} activos</div>`;
    return;
  }
  data.sort((a,b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (av === null || av === undefined) return 1;
    if (bv === null || bv === undefined) return -1;
    return (av - bv) * sortDir;
  });
  const wrap = document.getElementById('wt');
  if (!wrap) return;
  wrap.innerHTML = buildWatchlistTable(data);
  wrap.querySelector('[data-sort]') && wrap.querySelectorAll('[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.sort) sortDir *= -1;
      else { sortCol = th.dataset.sort; sortDir = -1; }
      renderWatchlistTable();
    });
  });
  wrap.innerHTML += `<div style="font-size:11px;color:var(--muted);margin-top:8px;font-family:monospace">${data.length} activos mostrados</div>`;
}

function buildWatchlistTable(data) {
  const arrow = col => `<span class="sort-arrow">${sortCol===col?(sortDir>0?'↑':'↓'):'↕'}</span>`;
  return `<table style="table-layout:fixed;width:100%;min-width:760px">
  <thead><tr>
    <th style="width:28px"></th>
    <th style="width:68px" data-sort="t" class="${sortCol==='t'?'sorted':''}">Ticker${arrow('t')}</th>
    <th style="width:140px">Empresa</th>
    <th style="width:90px">Bloque</th>
    <th style="width:88px;text-align:right" data-sort="p" class="${sortCol==='p'?'sorted':''}">Precio${arrow('p')}</th>
    <th style="width:80px;text-align:right" data-sort="upside" class="${sortCol==='upside'?'sorted':''}">Upside${arrow('upside')}</th>
    <th style="width:48px;text-align:right">Hoy</th>
    <th style="width:70px">Spark</th>
    <th style="width:100px" data-sort="scoreFin" class="${sortCol==='scoreFin'?'sorted':''}">Score${arrow('scoreFin')}</th>
    <th style="width:110px">Señal</th>
    <th style="width:72px">CEDEAR</th>
    <th style="width:80px"></th>
  </tr></thead><tbody>
  ${data.map(x => `<tr>
    <td>${favBtn(x.t)}</td>
    <td><span class="tkr" onclick="gotoDetail('${x.t}')">${x.t}</span>${trendArrow(x.t)}${etag(x.earning)}</td>
    <td class="co" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.n}</td>
    <td style="font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.bloque.replace('Radar ','').replace(' CEDEAR','')}</td>
    <td class="num" id="p_${x.t}">$${x.p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    <td class="num">${upStr(x.upside)}</td>
    <td class="num" id="chg_${x.t}"><span class="nt">—</span></td>
    <td id="spark_${x.t}" style="min-width:60px"></td>
    <td>${sbar(x.scoreFin)}</td>
    <td>${badge(x.señal)}</td>
    <td style="font-size:10px;color:var(--muted)">${x.cedear}</td>
    <td style="white-space:nowrap">${compareBtn(x.t)} <button onclick="event.stopPropagation();openCalc('${x.t}')" style="font-size:10px;font-family:monospace;background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 6px;cursor:pointer;margin-left:3px" title="Calculadora de posición">📐</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}

// ── SECTORS ──────────────────────────────────────────────────────
function renderSectors() {
  const root = document.getElementById('sectormap');
  const sm = {};
  RAW.filter(x => x.cat !== 'ETF').forEach(x => {
    const g = x.sector.split('/')[0].trim();
    if (!sm[g]) sm[g] = { count:0, verde:0, upside:[], score:[] };
    sm[g].count++;
    if (x.señal && x.señal.includes('Verde')) sm[g].verde++;
    if (x.upside !== null && x.upside > 0) sm[g].upside.push(x.upside);
    if (x.scoreFin) sm[g].score.push(x.scoreFin);
  });
  const sectors = Object.entries(sm).sort((a,b) => b[1].count - a[1].count);
  const barColors = ['#58a6ff','#3fb950','#e07e3a','#d29922','#f85149','#a371f7','#79c0ff','#56d364','#ffa657','#8b949e','#58a6ff','#3fb950','#e07e3a','#d29922','#f85149','#a371f7'];

  root.innerHTML = `
  <div class="sec-ttl">EXPOSICIÓN POR SECTOR</div>
  <div class="cht-wrap" style="height:${sectors.length*34+60}px;margin-bottom:20px">

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap() {
  const root = document.getElementById('heatmap');
  const sectors = {};
  RAW.filter(x => x.cat !== 'ETF').forEach(x => {
    const s = x.sector.split('/')[0].trim();
    if (!sectors[s]) sectors[s] = [];
    sectors[s].push(x);
  });
  root.innerHTML = `
  <div class="sec-ttl">HEATMAP POR SECTOR — tamaño = market cap, color = señal</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:14px;font-family:monospace">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:var(--gdim);border:1px solid var(--green)"></span>Compra</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:var(--adim);border:1px solid var(--amber)"></span>Esperar</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:var(--odim);border:1px solid var(--orange)"></span>Pos. chica</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:var(--rdim);border:1px solid var(--red)"></span>Evitar</span>
  </div>
  <div id="hm-wrap" style="display:flex;flex-direction:column;gap:5px"></div>`;

  const wrap = document.getElementById('hm-wrap');
  Object.entries(sectors).sort((a,b) => b[1].reduce((s,x) => s+(x.cap||1),0) - a[1].reduce((s,x) => s+(x.cap||1),0)).forEach(([sec,items]) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:4px;align-items:stretch';
    const sl = document.createElement('div');
    sl.style.cssText = 'font-size:10px;color:var(--muted);width:78px;flex-shrink:0;padding-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:\'IBM Plex Mono\',monospace';
    sl.textContent = sec;
    row.appendChild(sl);
    const cells = document.createElement('div');
    cells.style.cssText = 'display:flex;gap:3px;flex:1;flex-wrap:wrap';
    items.sort((a,b) => (b.cap||0) - (a.cap||0)).forEach(x => {
      const s = x.señal || '';
      const bg = s.includes('Verde') ? 'var(--gdim)' : s.includes('Amarillo') ? 'var(--adim)' : s.includes('Naranja') ? 'var(--odim)' : s.includes('Rojo') ? 'var(--rdim)' : 'var(--bg3)';
      const tc = s.includes('Verde') ? 'var(--green)' : s.includes('Amarillo') ? 'var(--amber)' : s.includes('Naranja') ? 'var(--orange)' : s.includes('Rojo') ? 'var(--red)' : 'var(--muted)';
      const brd = s.includes('Verde') ? 'var(--green)' : s.includes('Amarillo') ? 'var(--amber)' : s.includes('Naranja') ? 'var(--orange)' : s.includes('Rojo') ? 'var(--red)' : 'var(--border)';
      const sz = Math.max(52, Math.min(110, Math.round(40 + (x.cap||10)/100)));
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      cell.style.cssText = `background:${bg};border:1px solid ${brd};width:${sz}px;min-height:38px`;
      cell.innerHTML = `<div style="font-size:11px;font-weight:600;color:${tc};font-family:monospace">${x.t}</div><div style="font-size:9px;color:${tc};opacity:.85">${x.upside !== null && x.upside !== undefined ? (x.upside >= 0 ? '+' : '') + Math.round(x.upside*100) + '%' : '—'}</div>`;
      cell.onclick = () => gotoDetail(x.t);

    });

    wrap.appendChild(row);
  });
}

// ── SCATTER ───────────────────────────────────────────────────────
function renderScatter() {
  const root = document.getElementById('scatter');
  root.innerHTML = `
  <div class="sec-ttl">MATRIZ RIESGO/RETORNO — calidad vs upside</div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Arriba a la derecha = calidad alta + buen precio. Clic en punto para ver detalle.</div>

  <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:10px;font-family:monospace">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green)"></span>Compra</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></span>Esperar</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--orange)"></span>Pos. chica</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red)"></span>Evitar</span>
  </div>`;

  const data = RAW.filter(x => x.scoreFin && x.upside !== null && x.upside !== undefined && x.cat !== 'ETF');
  const pts = data.map(x => {
    const s = x.señal || '';
    return { x: parseFloat((x.upside*100).toFixed(1)), y: parseFloat(x.scoreFin.toFixed(2)), t: x.t,
      bg: s.includes('Verde') ? '#3fb950' : s.includes('Amarillo') ? '#d29922' : s.includes('Naranja') ? '#e07e3a' : '#f85149' };
  });

  dc('scatterChart');
  if (window.Chart) {
    const ch = new Chart(document.getElementById('scatterChart').getContext('2d'), {
      type: 'scatter',
      data: { datasets: [{ data: pts, backgroundColor: pts.map(p => p.bg + 'BB'), borderColor: pts.map(p => p.bg), borderWidth: 1, pointRadius: 7, pointHoverRadius: 9 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top:20, right:20 } },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw.t}: score ${ctx.raw.y} | upside +${ctx.raw.x}%` } } },
        scales: {
          x: { title: { display:true, text:'Upside al consenso (%)', color:'#8b949e', font:{size:11} }, grid: { color:'rgba(48,54,61,.6)' }, border: { color:'#30363d' }, ticks: { callback: v => v+'%', color:'#8b949e' } },
          y: { title: { display:true, text:'Score final', color:'#8b949e', font:{size:11} }, min:3.5, max:10, grid: { color:'rgba(48,54,61,.6)' }, border: { color:'#30363d' }, ticks: { color:'#8b949e' } }
        },
        onClick: (e, els) => { if (els.length) gotoDetail(pts[els[0].index].t); }
      }
    });
    _charts.scatterChart = ch;
    Chart.register({ id:'scatter-labels', afterDraw(chart) {
      const ctx2 = chart.ctx; ctx2.save();
      chart.data.datasets[0].data.forEach((pt, i) => {
        const meta = chart.getDatasetMeta(0); const el = meta.data[i]; if (!el) return;
        ctx2.fillStyle = pts[i].bg; ctx2.font = 'bold 9px sans-serif'; ctx2.textAlign = 'center';
        ctx2.fillText(pt.t, el.x, el.y - 10);
      });
      ctx2.restore();
    }});
    ch.update();
  }
}

  function grp(title, items, color) {

    return `<div style="font-size:12px;font-weight:500;color:${color};margin:14px 0 8px;font-family:monospace">${title} (${items.length})</div>

    </tr></thead><tbody>
    ${items.map(x => `<tr>
      <td>${favBtn(x.t)}</td>

  const shown = [...new Set(selItems)].slice(0, 20);

  root.innerHTML = `

    <td><span class="tkr" onclick="gotoDetail('${x.t}')">${x.t}</span></td>

    <td class="num" id="pw_${x.t}" style="font-size:12px;font-family:monospace">—</td>
  </tr>`).join('')}
  </tbody></table></div>
  <div id="pfCharts" style="margin-top:1rem"></div>`;

function setPf(t, v) {
  portfolio[t] = parseFloat(v) || 0;
  localStorage.setItem('ir_portfolio', JSON.stringify(portfolio));
  updatePfCharts();
}

function updatePfCharts() {
  const cw = document.getElementById('pfCharts'); if (!cw) return;
  const total = Object.values(portfolio).reduce((a,b) => a + (b||0), 0);
  RAW.filter(x => x.cat !== 'ETF').forEach(x => {
    const el = document.getElementById(`pw_${x.t}`);
    if (el) el.textContent = total > 0 && portfolio[x.t] ? ((portfolio[x.t]/total*100).toFixed(1) + '%') : '—';
  });
  if (!total) { cw.innerHTML = '<div class="notice">Ingresá capital en la tabla para ver la distribución.</div>'; return; }
  const catTotals = {};
  RAW.filter(x => x.cat !== 'ETF' && portfolio[x.t] > 0).forEach(x => { catTotals[x.cat] = (catTotals[x.cat]||0) + (portfolio[x.t]||0); });
  const entries = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);
  const colors = ['#58a6ff','#3fb950','#e07e3a','#d29922','#f85149','#a371f7'];
  cw.innerHTML = `<div class="sec-ttl">DISTRIBUCIÓN POR CATEGORÍA</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:10px;font-family:monospace">
    ${entries.map(([c,v],i) => `<span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:${colors[i%colors.length]}"></span>${c} ${(v/total*100).toFixed(1)}%</span>`).join('')}
  </div>
  <div style="position:relative;width:100%;height:180px"><canvas id="pfDonut" role="img" aria-label="Distribución cartera"></canvas></div>
  <div style="font-size:11px;font-family:monospace;color:var(--muted);margin-top:14px">Capital total: <span style="color:var(--text);font-weight:600">$${total.toLocaleString('en')}</span></div>`;
  dc('pfDonut');
  if (window.Chart) {
    _charts.pfDonut = new Chart(document.getElementById('pfDonut').getContext('2d'), {
      type: 'doughnut',
      data: { labels: entries.map(([c]) => c), datasets: [{ data: entries.map(([,v]) => parseFloat((v/total*100).toFixed(1))), backgroundColor: entries.map((_,i) => colors[i%colors.length]), borderColor: '#161b22', borderWidth: 3 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { display: false } } }
    });
  }
}

  const root = document.getElementById('detail-view');
  root.innerHTML = '';
  if (selTicker === '__compare__') { renderCompare(); return; }
  const x = RAW.find(d => d.t === selTicker);
  if (!x) return;

  const s = x.señal || '';
  const scBg = s.includes('Verde') ? 'var(--gdim)' : s.includes('Amarillo') ? 'var(--adim)' : s.includes('Naranja') ? 'var(--odim)' : s.includes('Rojo') ? 'var(--rdim)' : 'var(--bdim)';
  const scTc = s.includes('Verde') ? 'var(--green)' : s.includes('Amarillo') ? 'var(--amber)' : s.includes('Naranja') ? 'var(--orange)' : s.includes('Rojo') ? 'var(--red)' : 'var(--blue)';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = '← Volver';
  back.onclick = () => { selTicker = null; showTab(prevTab); const r = {overview:renderOverview,favoritos:renderFavs,watchlist:renderWatchlist,ranking:renderRanking,sectormap:renderSectors,heatmap:renderHeatmap,scatter:renderScatter,earnings:renderEarnings,portfolio:renderPortfolio}; if(r[prevTab]) r[prevTab](); };

    <div style="width:46px;height:46px;border-radius:8px;background:${scBg};border:1px solid ${scTc};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:${scTc};flex-shrink:0;font-family:monospace">${x.t.slice(0,3)}</div>
    <div style="flex:1">
      <div style="font-size:20px;font-weight:600;font-family:monospace;display:flex;align-items:center;gap:8px">${x.t} ${favBtn(x.t)}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${x.n} &nbsp;·&nbsp; ${x.sector}</div>

        ${compareBtn(x.t)}
        <button onclick="openCalc('${x.t}')" style="font-size:10px;font-family:monospace;background:var(--adim);border:1px solid var(--amber);color:var(--amber);border-radius:4px;padding:2px 8px;cursor:pointer">📐 Calcular posición</button>
        <button onclick="generarReporteTicker('${x.t}')" style="font-size:10px;font-family:monospace;background:var(--bdim);border:1px solid var(--acc);color:var(--acc);border-radius:4px;padding:2px 8px;cursor:pointer">⬇ Reporte PDF</button>

    <div style="text-align:right;flex-shrink:0">

      <div style="font-size:11px;color:var(--muted)" id="det-chg">Precio actual</div>
    </div>

    hdr.innerHTML += `<div style="border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;font-family:monospace">
        <span>Ideal $${Math.round(ideal)}</span><span>Razonable $${Math.round(razonable)}</span><span>Target $${Math.round(x.target)}</span><span>Caro $${Math.round(caro)}</span>
      </div>
      <div style="position:relative;height:10px;background:var(--bg3);border-radius:5px;margin-bottom:8px">

    sc2.innerHTML = `<div class="sec-ttl">Snowflake — perfil de calidad</div><div style="position:relative;width:100%;height:200px"><canvas id="snow" role="img" aria-label="Radar ${x.t}"></canvas></div>`;

    const mc2 = document.createElement('div'); mc2.className = 'snowcard';

    dc('snow');

        type: 'radar',
        data: { labels: ['Calidad','Balance','Crecimiento','Valuación','Momentum'], datasets: [{ data: [x.q,x.b,x.g,x.v,x.mo], backgroundColor: '#58a6ff22', borderColor: '#58a6ff', borderWidth: 2, pointBackgroundColor: '#58a6ff', pointRadius: 4 }] },

      });
    }
  }

async function fetchNews(ticker, name) {
  const el = document.getElementById(`news-${ticker}`);
  if (!el) return;
  try {
    const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${new Date(Date.now()-7*24*3600000).toISOString().slice(0,10)}&to=${new Date().toISOString().slice(0,10)}&token=${FINNHUB}`);
    const news = await r.json();
    if (!news || !news.length) { el.textContent = 'Sin noticias recientes.'; return; }
    el.innerHTML = news.slice(0,5).map(n => `
      <div style="padding:10px 0;border-bottom:1px solid rgba(48,54,61,.4)">
        <div style="font-size:12px;color:var(--text);margin-bottom:4px;line-height:1.4">${n.headline}</div>
        <div style="display:flex;gap:10px;align-items:center">
          <span style="color:var(--muted);font-size:10px">${n.source}</span>
          <span style="color:var(--muted);font-size:10px">${new Date(n.datetime*1000).toLocaleDateString('es-AR')}</span>
          <a href="${n.url}" target="_blank" style="color:var(--acc);font-size:10px;text-decoration:none">Leer →</a>
        </div>
      </div>`).join('') + (news.length === 0 ? '' : '');
  } catch(e) { el.textContent = 'No se pudieron cargar las noticias.'; }
}

async function loadMarketIndicators() {
  const indices = [{sym:'SPY',price:'m-spy',chg:'mc-spy'},{sym:'QQQ',price:'m-qqq',chg:'mc-qqq'},{sym:'SMH',price:'m-smh',chg:'mc-smh'},{sym:'GLD',price:'m-gld',chg:'mc-gld'}];
  for (const idx of indices) {
    try {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${idx.sym}&token=${FINNHUB}`);
      const d = await r.json();
      if (d && d.c) {
        const priceEl = document.getElementById(idx.price);
        const chgEl = document.getElementById(idx.chg);
        if (priceEl) priceEl.textContent = '$' + d.c.toFixed(2);
        if (chgEl) {
          const chg = ((d.c - d.pc) / d.pc * 100);
          chgEl.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
          chgEl.className = 'mkt-chg ' + (chg >= 0 ? 'up' : 'dn');
        }
      }
    } catch(e) {}
    await new Promise(res => setTimeout(res, 600));
  }
  const _upEl = document.getElementById('last-upd');
  if (_upEl && !lastUpdate) _upEl.textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

async function loadLivePrices() {
  if (pricesLoaded) return;
  const tickers = RAW.filter(x => x.cat !== 'ETF').map(x => x.t);
  setPriceBar('Conectando con Finnhub...', '#1c2333', '#8b949e');
  try {
    let updated = 0;
    for (let i = 0; i < tickers.length; i++) {
      const t = tickers[i];
      try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB}`);
        const d = await r.json();
        if (d && d.c && d.c > 0) {
          const x = RAW.find(item => item.t === t);
          if (x) {
            x.p = d.c;
            x.dp = ((d.c - d.pc) / d.pc * 100); // daily change %
            if (x.target) x.upside = (x.target - x.p) / x.p;
            updated++;
            // Update DOM if visible
            const pEl = document.getElementById(`p_${t}`);
            if (pEl) pEl.textContent = '$' + d.c.toFixed(2);
            const cEl = document.getElementById(`chg_${t}`);
            if (cEl) cEl.innerHTML = chgStr(x.dp);
          }
        }
      } catch(e) {}
      if (i < tickers.length - 1) await new Promise(res => setTimeout(res, 1100));
      setPriceBar('Actualizando... ' + (i+1) + '/' + tickers.length + ' (' + t + ')', '#1c2333', '#8b949e');
    }
    pricesLoaded = true;
    lastUpdate = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    const upEl = document.getElementById('last-upd');
    if (upEl) upEl.textContent = lastUpdate;
    setPriceBar('✓ ' + updated + ' precios actualizados — ' + lastUpdate, '#1a3a24', '#3fb950');
    setTimeout(() => { const bar = document.getElementById('price-bar'); if (bar) bar.style.opacity = '0.5'; }, 5000);
    // Re-render active tab
    const renders = { overview:renderOverview, favoritos:renderFavs, watchlist:renderWatchlist, ranking:renderRanking };
    if (renders[activeTab]) renders[activeTab]();
    checkAlertsAfterLoad();
    updateAlertBadge();
  } catch(e) {
    setPriceBar('Error al cargar precios: ' + e.message, '#3a1010', '#f85149');
  }
}

function setPriceBar(msg, bg, color) {
  const bar = document.getElementById('price-bar');
  if (!bar) return;
  bar.style.background = bg || 'var(--bg2)';
  bar.style.color = color || 'var(--muted)';
  bar.style.opacity = '1';
  bar.innerHTML = '<span>' + msg + '</span>' + (lastUpdate ? '<span style="color:var(--muted)">Actualizado: ' + lastUpdate + '</span>' : '');
}

let alerts = JSON.parse(localStorage.getItem('ir_alerts') || '{}');
// alerts[ticker] = { above: price|null, below: price|null }

function saveAlerts() { localStorage.setItem('ir_alerts', JSON.stringify(alerts)); }

function setAlert(ticker, type, value) {
  if (!alerts[ticker]) alerts[ticker] = { above: null, below: null };
  alerts[ticker][type] = value ? parseFloat(value) : null;
  if (!alerts[ticker].above && !alerts[ticker].below) delete alerts[ticker];
  saveAlerts();
  renderAlertsInModal();
}

function checkAlerts() {
  Object.entries(alerts).forEach(([ticker, cfg]) => {
    const x = RAW.find(r => r.t === ticker);
    if (!x || !x.p) return;
    if (cfg.above && x.p >= cfg.above) {
      showAlertToast(ticker, x.n, x.p, cfg.above, 'above');
    }
    if (cfg.below && x.p <= cfg.below) {
      showAlertToast(ticker, x.n, x.p, cfg.below, 'below');
    }
  });
}

function showAlertToast(ticker, name, price, target, type) {
  const toastKey = `toast_${ticker}_${type}_${target}`;
  if (sessionStorage.getItem(toastKey)) return; // don't repeat in same session
  sessionStorage.setItem(toastKey, '1');

  const container = document.getElementById('alert-toast-container') || (() => {
    const d = document.createElement('div');
    d.id = 'alert-toast-container';
    d.className = 'alert-toast';
    document.body.appendChild(d);
    return d;
  })();

  const item = document.createElement('div');
  item.className = `alert-toast-item ${type}`;
  const icon = type === 'above' ? '🟢' : '🔴';
  const msg = type === 'above' ? `superó $${target.toFixed(2)}` : `bajó a $${target.toFixed(2)}`;
  item.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-family:monospace;font-weight:600;font-size:13px;color:var(--text)">${icon} ${ticker} — Alerta de precio</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${name} ${msg}</div>
        <div style="font-family:monospace;font-size:14px;margin-top:4px;color:${type==='above'?'var(--green)':'var(--red)'}">Precio actual: $${price.toFixed(2)}</div>
      </div>
      <button onclick="this.closest('.alert-toast-item').remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;margin-left:8px">×</button>
    </div>
    <button onclick="gotoDetail('${ticker}');this.closest('.alert-toast-item').remove()" style="margin-top:8px;width:100%;font-size:11px;font-family:monospace;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px;cursor:pointer">Ver detalle →</button>`;
  container.appendChild(item);
  setTimeout(() => { if (item.parentNode) item.remove(); }, 12000);

  // Try browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`${ticker} — Alerta de precio`, { body: `${name} ${msg}. Precio actual: $${price.toFixed(2)}`, icon: '' });
  }
}

function addAlertFromForm() {
  const ticker = document.getElementById('alert-ticker-input').value.trim().toUpperCase();
  const above = parseFloat(document.getElementById('alert-above').value);
  const below = parseFloat(document.getElementById('alert-below').value);
  if (!ticker || !RAW.find(x => x.t === ticker)) {
    alert('Ticker no encontrado. Verificá el símbolo.'); return;
  }
  if (!above && !below) { alert('Ingresá al menos un precio de alerta.'); return; }
  if (!alerts[ticker]) alerts[ticker] = { above: null, below: null };
  if (above) alerts[ticker].above = above;
  if (below) alerts[ticker].below = below;
  saveAlerts();
  renderAlertsInModal();
  document.getElementById('alert-ticker-input').value = '';
  document.getElementById('alert-above').value = '';
  document.getElementById('alert-below').value = '';
}

function deleteAlert(ticker) {
  delete alerts[ticker];
  saveAlerts();
  renderAlertsInModal();
}

async function searchTickerFinnhub(symbol) {
  // Get quote
  const qr = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB}`);
  const q = await qr.json();
  if (!q || !q.c || q.c === 0) throw new Error('Ticker no encontrado o sin datos');
  
  // Get profile
  let name = symbol, sector = 'Sin clasificar';
  try {
    const pr = await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${symbol}&token=${FINNHUB}`);
    const p = await pr.json();
    if (p && p.name) name = p.name;
    if (p && p.finnhubIndustry) sector = p.finnhubIndustry;
  } catch(e) {}
  
  return {
    t: symbol.toUpperCase(),
    n: name,
    sec: sector,
    sector: sector,
    p: parseFloat(q.c.toFixed(2)),
    dp: parseFloat(((q.c - q.pc) / q.pc * 100).toFixed(2)),
    target: null,
    upside: null,
    señal: 'Naranja - posición chica',

async function addCustomTicker() {
  const tickerInput = document.getElementById('mt-ticker');
  const targetInput = document.getElementById('mt-target');
  const señalInput = document.getElementById('mt-señal');
  const btn = document.getElementById('mt-add-btn');
  const status = document.getElementById('mt-status');

  const symbol = tickerInput.value.trim().toUpperCase();
  if (!symbol) { showMtStatus('Ingresá un ticker', 'error'); return; }

  // Check if already in radar
  if (RAW.find(x => x.t === symbol)) {
    showMtStatus(`${symbol} ya está en el radar`, 'warning');
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.textContent = 'Buscando...';
  showMtStatus(`<div class="mt-loading"><div class="mt-spinner"></div>Buscando ${symbol} en Finnhub...</div>`, 'loading');

  try {
    const ticker = await searchTickerFinnhub(symbol);
    
    // Apply manual settings
    const targetVal = parseFloat(targetInput.value);
    if (targetVal > 0) {
      ticker.target = targetVal;
      ticker.upside = (targetVal - ticker.p) / ticker.p;
    }
    ticker.señal = señalInput.value;

    // Add to custom list and RAW
    customTickers.push(ticker);
    RAW.push(ticker);
    saveCustomTickers();

    showMtStatus(`✓ ${symbol} (${ticker.n}) agregado al radar — $${ticker.p.toFixed(2)}`, 'success');
    tickerInput.value = '';
    targetInput.value = '';

    // Refresh the page
    setTimeout(() => renderMisTickers(), 800);

  } catch(e) {
    showMtStatus(`Error: ${e.message}. Verificá que el ticker sea correcto (ej: AAPL, TSLA).`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Buscar y agregar';
  }
}

function showMtStatus(msg, type) {

  if (!el) return;
  const colors = { error: 'var(--red)', success: 'var(--green)', warning: 'var(--amber)', loading: 'var(--muted)' };
  el.innerHTML = `<div style="font-size:12px;font-family:monospace;color:${colors[type]||'var(--muted)'};padding:6px 0">${msg}</div>`;
}

function removeCustomTicker(ticker) {

}

let priceHistory = JSON.parse(localStorage.getItem('ir_price_history') || '{}');
// priceHistory[ticker] = [{date, price}]

function recordPrices() {
  const today = new Date().toISOString().slice(0,10);
  RAW.filter(x => x.cat !== 'ETF' && x.p).forEach(x => {
    if (!priceHistory[x.t]) priceHistory[x.t] = [];
    const last = priceHistory[x.t][priceHistory[x.t].length-1];
    if (!last || last.date !== today) {
      priceHistory[x.t].push({ date: today, price: x.p });
      // Keep last 90 days
      if (priceHistory[x.t].length > 90) priceHistory[x.t].shift();
    }
  });
  localStorage.setItem('ir_price_history', JSON.stringify(priceHistory));
}

function getPriceChange(ticker, days) {
  const hist = priceHistory[ticker];
  if (!hist || hist.length < 2) return null;
  const old = hist[Math.max(0, hist.length - days)];
  const cur = hist[hist.length - 1];
  if (!old || !cur) return null;
  return ((cur.price - old.price) / old.price * 100);
}

function calcUpdate() {
  const capital = parseFloat(document.getElementById('c-capital')?.value) || 0;
  const price = parseFloat(document.getElementById('c-price')?.value) || 0;
  const stopPct = parseFloat(document.getElementById('c-stop')?.value) || 8;
  const target = parseFloat(document.getElementById('c-target')?.value) || 0;
  const riskPct = parseFloat(document.getElementById('c-risk')?.value) || 2;
  const commPct = parseFloat(document.getElementById('c-comm')?.value) || 0;
  const res = document.getElementById('calc-result');
  if (!res || !price || !capital) return;

  const stopPrice = price * (1 - stopPct/100);
  const riskPerShare = price - stopPrice;
  const maxRiskUSD = capital * (riskPct/100);
  const shares = Math.floor(maxRiskUSD / riskPerShare);
  const totalInvestment = shares * price;
  const commCost = totalInvestment * (commPct/100) * 2; // buy + sell
  const potentialLoss = shares * riskPerShare + commCost;
  const potentialGain = target > price ? shares * (target - price) - commCost : null;
  const rr = potentialGain ? (potentialGain / potentialLoss).toFixed(2) : null;
  const portfolioPct = (totalInvestment / capital * 100).toFixed(1);

  const rrColor = rr >= 3 ? 'var(--green)' : rr >= 2 ? 'var(--amber)' : 'var(--red)';

  res.innerHTML = `

      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:600;font-family:monospace;color:var(--text)">${portfolioPct}%</div>
        <div style="font-size:10px;color:var(--muted);font-family:monospace">DEL CAPITAL</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-size:12px;font-family:monospace">
      <div style="background:var(--rdim);border-radius:6px;padding:8px 10px">
        <div style="color:var(--muted);font-size:10px;margin-bottom:3px">STOP LOSS</div>
        <div style="color:var(--red);font-weight:600">$${stopPrice.toFixed(2)} (-${stopPct}%)</div>
        <div style="color:var(--red);font-size:11px">Pérdida: -$${potentialLoss.toFixed(0)}</div>
      </div>
      ${target > price ? `<div style="background:var(--gdim);border-radius:6px;padding:8px 10px">
        <div style="color:var(--muted);font-size:10px;margin-bottom:3px">TARGET</div>
        <div style="color:var(--green);font-weight:600">$${target.toFixed(2)} (+${((target-price)/price*100).toFixed(1)}%)</div>
        <div style="color:var(--green);font-size:11px">Ganancia: +$${potentialGain.toFixed(0)}</div>
      </div>` : '<div style="background:var(--bg2);border-radius:6px;padding:8px 10px"><div style="color:var(--muted);font-size:10px">Ingresá un target para ver la ganancia potencial</div></div>'}
    </div>
    ${rr ? `<div style="margin-top:10px;text-align:center;padding:8px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)">
      <span style="font-size:11px;color:var(--muted);font-family:monospace">RATIO RIESGO/BENEFICIO: </span>
      <span style="font-size:16px;font-weight:600;font-family:monospace;color:${rrColor}">1:${rr}</span>
      <span style="font-size:10px;color:var(--muted);margin-left:8px">${rr >= 3 ? '✓ Excelente' : rr >= 2 ? '~ Aceptable' : '✗ Bajo'}</span>
    </div>` : ''}`;
}

function renderCorrelacion() {
  const modal = document.getElementById('corr-modal');
  if (!modal) return;

  const tickers = Object.keys(priceHistory).filter(t => priceHistory[t].length >= 10).slice(0,20);
  
  document.getElementById('corr-content').innerHTML = `

    </div>

      `<div class="notice">Necesitás abrir el dashboard al menos 10 días para que el historial sea suficiente para calcular correlaciones.<br><br>Por ahora tenés datos de ${tickers.length} tickers.</div>` :
      renderCorrMatrix(tickers)
    }`;
}

function calcCorr(t1, t2) {
  const h1 = priceHistory[t1], h2 = priceHistory[t2];
  if (!h1 || !h2) return null;
  const dates = h1.map(x => x.date).filter(d => h2.find(y => y.date === d));
  if (dates.length < 5) return null;
  const v1 = dates.map(d => h1.find(x => x.date === d)?.price).filter(Boolean);
  const v2 = dates.map(d => h2.find(x => x.date === d)?.price).filter(Boolean);
  const r1 = v1.slice(1).map((p,i) => (p-v1[i])/v1[i]);
  const r2 = v2.slice(1).map((p,i) => (p-v2[i])/v2[i]);
  if (r1.length < 3) return null;
  const m1 = r1.reduce((a,b)=>a+b,0)/r1.length;
  const m2 = r2.reduce((a,b)=>a+b,0)/r2.length;
  const num = r1.reduce((a,x,i)=>a+(x-m1)*(r2[i]-m2),0);
  const d1 = Math.sqrt(r1.reduce((a,x)=>a+(x-m1)**2,0));
  const d2 = Math.sqrt(r2.reduce((a,x)=>a+(x-m2)**2,0));
  return d1*d2 === 0 ? null : num/(d1*d2);
}

function corrColor(v) {
  if (v === null) return 'var(--bg3)';
  if (v > 0.8) return '#3a1010';
  if (v > 0.5) return '#3a200a';
  if (v > 0.2) return '#3a2d0a';
  if (v > -0.2) return '#1c2333';
  return '#1a3a24';
}
function corrTextColor(v) {
  if (v === null) return 'var(--muted)';
  if (v > 0.8) return '#f85149';
  if (v > 0.5) return '#e07e3a';
  if (v > 0.2) return '#d29922';
  if (v > -0.2) return '#8b949e';
  return '#3fb950';
}

// ── TENDENCIA 50 días ───────────────────────────────────────────
function trendArrow(ticker) {
  const hist = priceHistory[ticker];
  if (!hist || hist.length < 10) return '';
  const ma = hist.slice(-Math.min(50,hist.length)).reduce((a,b) => a+b.price, 0) / Math.min(50,hist.length);
  const cur = hist[hist.length-1].price;
  const pct = ((cur-ma)/ma*100).toFixed(1);
  if (cur > ma * 1.02) return `<span style="color:var(--green);font-size:11px;margin-left:3px" title="Por encima de MA50 (+${pct}%)">↑</span>`;
  if (cur < ma * 0.98) return `<span style="color:var(--red);font-size:11px;margin-left:3px" title="Por debajo de MA50 (${pct}%)">↓</span>`;
  return `<span style="color:var(--muted);font-size:11px;margin-left:3px" title="Cerca de MA50 (${pct}%)">→</span>`;
}

// ── FETCH FUNDAMENTALES VIA FINNHUB ────────────────────────────
async function fetchFundamentals(ticker) {
  if (fundamentalsCache[ticker] && fundamentalsCache[ticker]._ts && Date.now() - fundamentalsCache[ticker]._ts < 86400000) {
    return fundamentalsCache[ticker];
  }
  try {
    const [metricR, profileR] = await Promise.all([
      fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${FINNHUB}`),
      fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${FINNHUB}`)
    ]);
    const metric = await metricR.json();
    const profile = await profileR.json();
    const m = metric.metric || {};
    const data = {
      pe: m['peNormalizedAnnual'] || m['peTTM'] || null,
      ps: m['psTTM'] || null,
      pb: m['pbQuarterly'] || null,
      evEbitda: m['evEbitdaTTM'] || null,
      roe: m['roeTTM'] || null,
      netMargin: m['netMarginTTM'] || null,
      debtEquity: m['totalDebt/totalEquityQuarterly'] || null,
      revenueGrowth: m['revenueGrowthTTMYoy'] || null,
      epsGrowth: m['epsGrowthTTMYoy'] || null,
      marketCap: profile.marketCapitalization || null,
      beta: m['beta'] || null,
      dividendYield: m['dividendYieldIndicatedAnnual'] || null,
      high52: m['52WeekHigh'] || null,
      low52: m['52WeekLow'] || null,
      employees: profile.employeeTotal || null,
      country: profile.country || null,
      exchange: profile.exchange || null,
      ipo: profile.ipo || null,
      _ts: Date.now()
    };
    fundamentalsCache[ticker] = data;
    saveFundamentals();
    return data;
  } catch(e) { return null; }
}

async function fetchEarningsHistory(ticker) {
  if (earningsCache[ticker] && earningsCache[ticker]._ts && Date.now() - earningsCache[ticker]._ts < 86400000) {
    return earningsCache[ticker].data;
  }
  try {
    const r = await fetch(`https://finnhub.io/api/v1/stock/earnings?symbol=${ticker}&limit=8&token=${FINNHUB}`);
    const data = await r.json();
    earningsCache[ticker] = { data, _ts: Date.now() };
    saveEarningsHist();
    return data;
  } catch(e) { return []; }
}

// ── AUTO SNOWFLAKE CALCULATION ──────────────────────────────────
function calcAutoSnow(f, ticker) {
  const rx = ticker ? RAW.find(r => r.t === ticker) : null;
  if (!f) return null;
  // Quality (0-10): ROE + Net Margin
  let q = 5;
  if (f.roe !== null) q += f.roe > 20 ? 2 : f.roe > 10 ? 1 : f.roe < 0 ? -2 : 0;
  if (f.netMargin !== null) q += f.netMargin > 20 ? 2 : f.netMargin > 10 ? 1 : f.netMargin < 0 ? -2 : 0;
  q = Math.max(1, Math.min(10, Math.round(q)));

  // Balance (0-10): D/E ratio
  let b = 7;
  if (f.debtEquity !== null) b = f.debtEquity > 2 ? 3 : f.debtEquity > 1 ? 5 : f.debtEquity > 0.5 ? 7 : 9;
  b = Math.max(1, Math.min(10, b));

  // Growth (0-10): Revenue + EPS growth
  let g = 5;
  if (f.revenueGrowth !== null) g += f.revenueGrowth > 0.2 ? 2 : f.revenueGrowth > 0.1 ? 1 : f.revenueGrowth < 0 ? -2 : 0;
  if (f.epsGrowth !== null) g += f.epsGrowth > 0.2 ? 2 : f.epsGrowth > 0.1 ? 1 : f.epsGrowth < 0 ? -2 : 0;
  g = Math.max(1, Math.min(10, Math.round(g)));

  // Valuation (0-10): PE, PS
  let v = 5;
  if (f.pe !== null) v += f.pe < 15 ? 3 : f.pe < 25 ? 1 : f.pe < 40 ? -1 : -3;
  if (f.ps !== null) v += f.ps < 3 ? 1 : f.ps > 15 ? -1 : 0;
  v = Math.max(1, Math.min(10, Math.round(v)));

  // Momentum: use current price position in 52w range
  let mo = 5;
  if (f.high52 && f.low52 && f.high52 > f.low52 && rx) {
    const pos = (rx.p - f.low52) / (f.high52 - f.low52);
    mo = pos > 0.8 ? 9 : pos > 0.6 ? 7 : pos > 0.4 ? 5 : pos > 0.2 ? 3 : 1;
  }
  mo = Math.max(1, Math.min(10, mo));

  const sf = ((q + b + g + v + mo) / 5 * 1.2).toFixed(1);
  return { q, b, g, v, mo, sf: parseFloat(sf) };
}

// ── DCF SIMPLIFICADO ───────────────────────────────────────────
function calcDCF(ticker) {
  const x = RAW.find(r => r.t === ticker);
  if (!x) return null;
  const f = fundamentalsCache[ticker];
  if (!f || !f.revenueGrowth) return null;

  // Simple DCF: use EPS growth as proxy
  const growthRate = Math.min(0.3, Math.max(0, f.epsGrowth || f.revenueGrowth || 0.1));
  const terminalGrowth = 0.03;
  const discountRate = 0.10;
  const years = 5;

  // Estimate current "earnings" from price and PE
  if (!f.pe || f.pe <= 0) return null;
  const eps = x.p / f.pe;
  
  let pv = 0;
  for (let i = 1; i <= years; i++) {
    const futureEps = eps * Math.pow(1 + growthRate, i);
    pv += futureEps / Math.pow(1 + discountRate, i);
  }
  // Terminal value
  const terminalEps = eps * Math.pow(1 + growthRate, years) * (1 + terminalGrowth);
  const terminalValue = terminalEps / (discountRate - terminalGrowth);
  pv += terminalValue / Math.pow(1 + discountRate, years);
  
  // Apply PE multiple
  const intrinsic = pv * 15; // conservative PE of 15
  const margin = ((intrinsic - x.p) / x.p * 100).toFixed(1);
  
  return {
    intrinsic: parseFloat(intrinsic.toFixed(2)),
    current: x.p,
    margin: parseFloat(margin),
    growthUsed: (growthRate * 100).toFixed(1),
    overUnder: intrinsic > x.p ? 'subvaluada' : 'sobrevaluada'
  };
}

function drawBubbles(data) {
  const canvas = document.getElementById('bubble-canvas');
  const wrap = document.getElementById('bubble-canvas-wrap');
  if (!canvas || !wrap) return;
  
  const W = wrap.clientWidth, H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  
  const maxCap = Math.max(...data.map(x => x.cap || 1));
  const tooltip = document.getElementById('bubble-tooltip');
  
  // Simple packed layout
  const bubbles = data.map(x => {
    const r = Math.max(22, Math.min(70, Math.sqrt((x.cap || 5) / maxCap) * 120 + 16));
    const dp = x.dp !== undefined ? x.dp : null;
    const dpVal = dp !== null ? dp : 0;
    const intensity = Math.min(1, Math.abs(dpVal) / 5);
    const color = dp === null ? 'rgba(88,166,255,0.5)' :
      dpVal >= 0
        ? 'rgba(46,' + Math.round(160+intensity*40) + ',67,' + (0.7+intensity*0.3) + ')'
        : 'rgba(' + Math.round(207+intensity*30) + ',34,46,' + (0.7+intensity*0.3) + ')';
    return { t: x.t, n: x.n, p: x.p, dp, r, color, x: 0, y: 0 };
  }).sort((a,b) => b.r - a.r);

  // Simple grid-ish placement
  let cx = 0, cy = 0, rowH = 0;
  const pad = 4;
  bubbles.forEach(b => {
    if (cx + b.r*2 > W - pad) { cx = pad; cy += rowH + pad; rowH = 0; }
    if (cx === 0) cx = pad;
    b.x = cx + b.r;
    b.y = cy + b.r + pad;
    cx += b.r*2 + pad;
    rowH = Math.max(rowH, b.r*2);
  });

  // Draw
  bubbles.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    
    // Text
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.max(9, Math.min(13, b.r*0.5))}px 'IBM Plex Mono',monospace`;
    ctx.fillText(b.t, b.x, b.y - (b.r > 30 ? 5 : 0));
    if (b.r > 28) {
      ctx.font = `${Math.max(8, b.r*0.35)}px 'IBM Plex Mono',monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      const dpText = b.dp !== null ? (b.dp >= 0 ? '+' : '') + b.dp.toFixed(1) + '%' : '—';
        ctx.fillText(dpText, b.x, b.y + (b.r > 40 ? 12 : 8));
    }
  });

  // Mouse interaction
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W/rect.width);
    const my = (e.clientY - rect.top) * (H/rect.height);
    const hit = bubbles.find(b => Math.hypot(mx-b.x, my-b.y) < b.r);
    if (hit) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX+14)+'px';
      tooltip.style.top = (e.clientY-10)+'px';
      tooltip.innerHTML = `<strong style="color:var(--acc)">${hit.t}</strong> — ${hit.n}<br>$${hit.p.toFixed(2)} &nbsp;<span style="color:${hit.dp>=0?'var(--green)':'var(--red)'}">${hit.dp>=0?'+':''}${hit.dp.toFixed(2)}% hoy</span>`;
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = 'default';
    }
  };
  canvas.onmouseleave = () => { if(tooltip) tooltip.style.display='none'; };
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(W/rect.width), my = (e.clientY-rect.top)*(H/rect.height);
    const hit = bubbles.find(b => Math.hypot(mx-b.x,my-b.y) < b.r);
    if (hit) gotoDetail(hit.t);
  };
}

// ── CALENDARIO DE EARNINGS ──────────────────────────────────────
function renderCalendarioEarnings() {
  const root = document.getElementById('calendarioe');
  if (!root) return;
  
  const withEarnings = RAW.filter(x => x.cat !== 'ETF' && x.earning !== null && x.earning <= 60)
    .sort((a,b) => a.earning - b.earning);
  
  // Group by week
  const weeks = {};
  const today = new Date();
  withEarnings.forEach(x => {
    const earDate = new Date(today);
    earDate.setDate(today.getDate() + x.earning);
    const weekNum = Math.floor(x.earning / 7);
    const weekLabel = weekNum === 0 ? '⚡ Esta semana' : weekNum === 1 ? 'Próxima semana' : `En ${weekNum} semanas`;
    if (!weeks[weekLabel]) weeks[weekLabel] = [];
    weeks[weekLabel].push({ ...x, earDate });
  });

  let html = `<div class="sec-ttl">CALENDARIO DE EARNINGS — próximos 60 días</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px">`;
  
  Object.entries(weeks).forEach(([week, items]) => {
    html += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden">
      <div style="padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px;font-family:monospace;font-weight:600;color:${week.includes('⚡') ? 'var(--orange)' : week.includes('Próxima') ? 'var(--amber)' : 'var(--acc)'}">${week}</div>
      <div style="padding:6px 0">`;
    items.forEach(x => {
      html += `<div style="padding:7px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(48,54,61,.3);cursor:pointer" onclick="gotoDetail('${x.t}')" onmouseenter="this.style.background='var(--bg3)'" onmouseleave="this.style.background=''">
        <span style="font-family:monospace;font-weight:600;color:var(--acc);min-width:52px">${x.t}</span>
        <span style="font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.n}</span>
        <span style="font-size:10px;font-family:monospace;color:${x.earning<=7?'var(--orange)':'var(--muted)'}">${x.earning}d</span>
        ${badge(x.señal)}
      </div>`;
    });
    html += '</div></div>';
  });
  
  html += '</div>';
  if (!Object.keys(weeks).length) html = '<div class="notice">Sin earnings en los próximos 60 días.</div>';
  root.innerHTML = html;
}

function clearSim() {
  if (confirm('Borrar toda la cartera?')) {
    portfolioSimulator = [];
    saveSimulator();
    renderSimulador();
  }
}

function addSimPosition() {
  const t = document.getElementById('sim-ticker')?.value?.trim()?.toUpperCase();
  const shares = parseFloat(document.getElementById('sim-shares')?.value);
  const price = parseFloat(document.getElementById('sim-price')?.value);
  const date = document.getElementById('sim-date')?.value;
  
  if (!t || !shares || !price) { alert('Completá todos los campos.'); return; }
  const x = RAW.find(r => r.t === t);
  if (!x) { alert('Ticker no encontrado en el radar.'); return; }
  
  portfolioSimulator.push({ t, n: x.n, shares, buyPrice: price, buyDate: date });
  saveSimulator();
  renderSimulador();
}

function removeSimPosition(idx) {
  portfolioSimulator.splice(idx, 1);
  saveSimulator();
  renderSimulador();
}

function generateSnowflakeSVG(q, b, g, v, mo, size) {
  size = size || 120;
  const cx = size/2, cy = size/2, r = size*0.42;
  const labels = ['Calidad','Balance','Crecimiento','Valuación','Momentum'];
  const values = [q||0, b||0, g||0, v||0, mo||0];
  const n = 5;
  const angleStep = (Math.PI * 2) / n;
  const startAngle = -Math.PI / 2;

  // Axis points at max
  const axisPoints = values.map((_, i) => {
    const angle = startAngle + i * angleStep;
    return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
  });

  // Data points
  const dataPoints = values.map((v2, i) => {
    const angle = startAngle + i * angleStep;
    const dist = (v2 / 10) * r;
    return { x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist };
  });

  // Grid lines (at 2, 4, 6, 8, 10)
  let gridSvg = '';
  [2,4,6,8,10].forEach(function(level) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      const angle = startAngle + i * angleStep;
      const d = (level/10) * r;
      pts.push((cx + Math.cos(angle)*d) + ',' + (cy + Math.sin(angle)*d));
    }
    gridSvg += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="#30363d" stroke-width="0.5"/>';
  });

  // Axis lines
  let axesSvg = '';
  axisPoints.forEach(function(pt) {
    axesSvg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + pt.x + '" y2="' + pt.y + '" stroke="#30363d" stroke-width="0.5"/>';
  });

  // Data polygon
  const dataPoly = dataPoints.map(function(pt) { return pt.x + ',' + pt.y; }).join(' ');
  const dataColor = '#58a6ff';

  // Labels
  let labelSvg = '';
  axisPoints.forEach(function(pt, i) {
    const angle = startAngle + i * angleStep;
    const lx = cx + Math.cos(angle) * (r + 16);
    const ly = cy + Math.sin(angle) * (r + 16);
    const anchor = Math.cos(angle) > 0.3 ? 'start' : Math.cos(angle) < -0.3 ? 'end' : 'middle';
    labelSvg += '<text x="' + lx + '" y="' + (ly + 3) + '" text-anchor="' + anchor + '" font-size="8" fill="#8b949e" font-family="sans-serif">' + labels[i] + ' ' + values[i] + '</text>';
  });

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" xmlns="http://www.w3.org/2000/svg">' +
    '<rect width="' + size + '" height="' + size + '" fill="#161b22" rx="6"/>' +
    gridSvg + axesSvg +
    '<polygon points="' + dataPoly + '" fill="' + dataColor + '33" stroke="' + dataColor + '" stroke-width="1.5"/>' +
    labelSvg +
    '</svg>';
}
